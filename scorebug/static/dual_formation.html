<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>VolleyScore Dual Formation</title>
<link href="https://fonts.googleapis.com/css2?family=Alfa+Slab+One&display=swap" rel="stylesheet">
<style>
:root {
 --primary-blue: #142850;
 --secondary-blue: #0a1f3c;
 --accent-red: #D83A56;
 --accent-gold: #F0A500;
 --subtle-border-color: #2a406b;
}

body {
 background: rgba(0,0,0,0); /* Transparent for OBS */
 margin: 0;
 padding: 20px;
 font-family: Arial, sans-serif;
 display: flex;
 justify-content: center;
 align-items: center;
 min-height: 100vh;
 overflow: hidden;
}

.dual-wrapper {
  display: flex;
  gap: 40px;
  width: 1800px; /* Fits comfortably on a 1920x1080 canvas */
}

.formation-container {
  flex: 1;
  background: linear-gradient(to bottom, var(--primary-blue), var(--secondary-blue));
  border-radius: 30px;
  overflow: hidden;
  box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
  border: 4px solid var(--subtle-border-color);
}

.header {
  display: flex;
  align-items: center;
  padding: 15px 30px;
  border-bottom: 5px solid white;
}

/* Home specific header */
.home .header { background: linear-gradient(to right, var(--accent-red), var(--primary-blue)); border-color: var(--accent-gold); }
/* Away specific header */
.away .header { background: linear-gradient(to right, var(--accent-gold), var(--primary-blue)); border-color: white; }

.team-logo {
  width: 60px;
  height: 60px;
  background-size: contain;
  border-radius: 12px;
  background-position: center;
  background-repeat: no-repeat;
  margin-right: 20px;
  filter: drop-shadow(0 4px 4px rgba(0,0,0,0.5));
}

.team-name {
  font-family: "Alfa Slab One", cursive;
  font-size: 32px;
  color: white;
  text-transform: none;
  letter-spacing: 2px;
}

.court-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  grid-gap: 15px;
  padding: 25px;
  background-image: radial-gradient(circle at center, #1e3a7a 0%, #0a1f3c 100%);
}

.player-card {
  background: rgba(255, 255, 255, 0.05);
  border: 2px solid var(--subtle-border-color);
  border-radius: 12px;
  padding: 15px;
  text-align: center;
  position: relative;
}

.pos-label {
  position: absolute;
  top: -8px;
  left: 15px;
  background: var(--accent-gold);
  color: var(--primary-blue);
  font-family: "Alfa Slab One", cursive;
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 4px;
}

.player-name {
  font-family: "Alfa Slab One", cursive;
  font-size: 18px;
  color: white;
  margin-top: 5px;
  min-height: 24px;
  white-space: nowrap;
  overflow: hidden;
}
</style>
</head>
<body>

<div class="dual-wrapper">
  <!-- HOME TEAM SECTION -->
  <div class="formation-container home">
    <div class="header">
      <div id="homeLogo" class="team-logo"></div>
      <div id="homeName" class="team-name">Home</div>
    </div>
    <div class="court-grid">
      <div class="player-card"><div class="pos-label">POS 4</div><div class="player-name" id="home-p4">-</div></div>
      <div class="player-card"><div class="pos-label">POS 3</div><div class="player-name" id="home-p3">-</div></div>
      <div class="player-card"><div class="pos-label">POS 2</div><div class="player-name" id="home-p2">-</div></div>
      <div class="player-card"><div class="pos-label">POS 5</div><div class="player-name" id="home-p5">-</div></div>
      <div class="player-card"><div class="pos-label">POS 6</div><div class="player-name" id="home-p6">-</div></div>
      <div class="player-card"><div class="pos-label">POS 1</div><div class="player-name" id="home-p1">-</div></div>
    </div>
  </div>

  <!-- AWAY TEAM SECTION -->
  <div class="formation-container away">
    <div class="header">
      <div id="awayLogo" class="team-logo"></div>
      <div id="awayName" class="team-name">Away</div>
    </div>
    <div class="court-grid">
      <div class="player-card"><div class="pos-label">POS 4</div><div class="player-name" id="away-p4">-</div></div>
      <div class="player-card"><div class="pos-label">POS 3</div><div class="player-name" id="away-p3">-</div></div>
      <div class="player-card"><div class="pos-label">POS 2</div><div class="player-name" id="away-p2">-</div></div>
      <div class="player-card"><div class="pos-label">POS 5</div><div class="player-name" id="away-p5">-</div></div>
      <div class="player-card"><div class="pos-label">POS 6</div><div class="player-name" id="away-p6">-</div></div>
      <div class="player-card"><div class="pos-label">POS 1</div><div class="player-name" id="away-p1">-</div></div>
    </div>
  </div>
</div>

<script>
async function updateGraphic() {
  try {
    const res = await fetch("/current");
    const data = await res.json();

    // Update Home
    document.getElementById("homeName").textContent = data.homeName;
    document.getElementById("homeLogo").style.backgroundImage = `url('${data.homeLogo}')`;
    if (data.homePlayers) {
      data.homePlayers.forEach((name, i) => {
        const el = document.getElementById(`home-p${i+1}`);
        if (el) el.textContent = name || "-";
      });
    }

    // Update Away
    document.getElementById("awayName").textContent = data.awayName;
    document.getElementById("awayLogo").style.backgroundImage = `url('${data.awayLogo}')`;
    if (data.awayPlayers) {
      data.awayPlayers.forEach((name, i) => {
        const el = document.getElementById(`away-p${i+1}`);
        if (el) el.textContent = name || "-";
      });
    }
  } catch (err) {
    console.error("Fetch error:", err);
  }
}

setInterval(updateGraphic, 1000);
updateGraphic();
</script>
</body>
</html>
